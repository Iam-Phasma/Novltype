<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novltype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orbs" id="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div id="app">

    <!-- Top bar: wordmark + toolbar -->
    <div class="topbar">
      <span class="wordmark">Novltype<span class="dot">.</span></span>

      <nav class="toolbar">

        <!-- Key row practice -->
        <div class="tool-group" id="tg-row">
          <button class="tool-btn active" data-val="all">all</button>
          <button class="tool-btn" data-val="top">top row</button>
          <button class="tool-btn" data-val="home">home row</button>
          <button class="tool-btn" data-val="bottom">bottom row</button>
        </div>

        <div class="tool-sep"></div>

        <!-- Word length -->
        <div class="tool-group" id="tg-len">
          <button class="tool-btn active" data-val="all">all</button>
          <button class="tool-btn" data-val="short">short</button>
          <button class="tool-btn" data-val="medium">medium</button>
          <button class="tool-btn" data-val="long">long</button>
        </div>

        <div class="tool-sep"></div>

        <!-- Timed mode -->
        <div class="tool-group" id="tg-time">
          <button class="tool-btn active" data-val="off">free</button>
          <button class="tool-btn" data-val="1min">1 min</button>
        </div>

      </nav>
    </div>

    <!-- Main typing area -->
    <main class="stage">
      <div class="word-display" id="word-display"></div>
      <div class="hint" id="hint">
        press <span class="hint-key">enter</span> to start
      </div>
      <input
        id="typer"
        class="typer"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
    </main>

    <!-- Stats bar -->
    <footer class="stats-bar">
      <div class="stat">
        <span class="stat-val" id="stat-time">0:00</span>
        <span class="stat-label">time</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-wpm">—</span>
        <span class="stat-label">wpm</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-acc">—</span>
        <span class="stat-label">acc</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-words">0</span>
        <span class="stat-label">words</span>
      </div>
    </footer>

    <div class="esc-hint" id="esc-hint">press <kbd>esc</kbd> to stop</div>

    <!-- Settings panel -->
    <div class="settings-btn" id="btn-settings" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>

    <div class="settings-panel" id="settings-panel">
      <div class="spanel-row">
        <span class="spanel-label">display</span>
        <div class="spanel-group" id="sp-display">
          <button class="spanel-btn active" data-val="word">1 word</button>
          <button class="spanel-btn" data-val="paragraph">paragraph</button>
          <button class="spanel-btn" data-val="rise">rise</button>
        </div>
      </div>
      <div class="spanel-row">
        <span class="spanel-label">mode</span>
        <div class="spanel-group" id="sp-jump">
          <button class="spanel-btn active" data-val="off">type</button>
          <button class="spanel-btn" data-val="on">jump</button>
        </div>
      </div>
      <div class="spanel-row">
        <span class="spanel-label">sound</span>
        <button class="spanel-toggle active" id="btn-sound">on</button>
      </div>
      <div class="spanel-row">
        <span class="spanel-label">theme</span>
        <button class="spanel-toggle" id="btn-theme">light</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
